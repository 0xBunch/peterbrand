[build]
builder = "nixpacks"

[deploy]
startCommand = "python data/import_data.py && python model/league_calibration.py && python model/pb_score.py && python model/vorp.py && streamlit run app/main.py --server.port $PORT --server.address 0.0.0.0 --server.headless true"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
