<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dedeaux Field 4.0 — Draft Command Center</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#14141f;--border:#2a2a3f;--text:#e0e0f0;--dim:#8888aa;
--gold:#ffd700;--green:#00cc66;--red:#ff4444;--blue:#4488ff;--purple:#aa66ff;
--orange:#ff8833;--cyan:#00cccc;--target:#00ff88;--avoid:#ff4466}
body{font-family:'SF Mono',Monaco,'Cascadia Code',monospace;background:var(--bg);color:var(--text);font-size:13px}
.app{max-width:1600px;margin:0 auto;padding:8px}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid var(--gold);border-radius:8px;padding:12px 20px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
header h1{font-size:16px;color:var(--gold);letter-spacing:1px}
.budget-bar{display:flex;gap:16px;font-size:13px}
.budget-bar .stat{display:flex;align-items:center;gap:4px}
.budget-bar .stat .label{color:var(--dim)}
.budget-bar .stat .val{font-weight:bold}
.val-green{color:var(--green)}.val-red{color:var(--red)}.val-gold{color:var(--gold)}.val-blue{color:var(--blue)}

.tabs{display:flex;gap:4px;margin-bottom:8px}
.tab{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:6px 6px 0 0;cursor:pointer;color:var(--dim);font-size:12px;transition:all .2s}
.tab:hover{color:var(--text);border-color:var(--gold)}
.tab.active{color:var(--gold);border-color:var(--gold);background:#1a1a2e;border-bottom-color:transparent}

.panel{background:var(--card);border:1px solid var(--border);border-radius:0 8px 8px 8px;padding:12px;min-height:500px}

/* DRAFT TRACKER */
.controls{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.controls input,.controls select{background:#0a0a15;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-family:inherit;font-size:12px}
.controls input{width:200px}
.controls select{min-width:80px}
.controls button{background:#1a1a2e;border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px}
.controls button:hover{border-color:var(--gold);color:var(--gold)}
.controls button.active{border-color:var(--gold);color:var(--gold);background:#2a2a3e}

table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#0a0a15;color:var(--dim);padding:6px 8px;text-align:left;position:sticky;top:0;z-index:10;cursor:pointer;white-space:nowrap;border-bottom:2px solid var(--border)}
th:hover{color:var(--gold)}
td{padding:5px 8px;border-bottom:1px solid #1a1a2e;white-space:nowrap}
tr:hover{background:#1a1a25}
tr.drafted{opacity:0.35;text-decoration:line-through}
tr.drafted td{color:var(--dim)}
tr.target{border-left:3px solid var(--target)}
tr.avoid{border-left:3px solid var(--avoid)}
tr.keeper{background:#1a2a1a;border-left:3px solid var(--green)}

.tier-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:11px;font-weight:bold}
.tier-1{background:#3a1a1a;color:#ff6666}.tier-2{background:#3a2a1a;color:#ffaa44}
.tier-3{background:#3a3a1a;color:#ffdd44}.tier-4{background:#1a3a1a;color:#66dd66}
.tier-5{background:#1a2a3a;color:#66aaff}.tier-6{background:#2a1a3a;color:#aa88ff}
.tier-7{background:#1a1a2a;color:#8888cc}.tier-8{background:#1a1a1a;color:#888888}

.pos-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:bold}
.pos-sp{background:#1a2a4a;color:#4488ff}.pos-rp{background:#1a3a3a;color:#44cccc}
.pos-c{background:#3a1a3a;color:#cc66cc}.pos-1b{background:#2a2a1a;color:#cccc44}
.pos-2b{background:#1a3a1a;color:#44cc44}.pos-3b{background:#3a2a1a;color:#cc8844}
.pos-ss{background:#2a1a3a;color:#8844cc}.pos-of{background:#1a2a2a;color:#44aacc}
.pos-dh{background:#2a2a2a;color:#aaaaaa}.pos-util{background:#1a1a2a;color:#8888cc}

.btn-draft{background:none;border:1px solid var(--border);color:var(--dim);padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px;font-family:inherit}
.btn-draft:hover{border-color:var(--red);color:var(--red)}
.btn-undraft{border-color:var(--green);color:var(--green)}
.btn-undraft:hover{border-color:var(--green);color:#fff;background:var(--green)}

.price-input{width:50px;background:#0a0a15;border:1px solid var(--border);color:var(--gold);padding:2px 4px;border-radius:3px;font-family:inherit;font-size:12px;text-align:center}

/* BUDGET ALLOCATION */
.alloc-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.alloc-section{background:#0a0a15;border:1px solid var(--border);border-radius:6px;padding:12px}
.alloc-section h3{color:var(--gold);margin-bottom:8px;font-size:13px}
.alloc-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #1a1a2a}
.alloc-row .slot{color:var(--dim)}
.alloc-row .range{color:var(--cyan)}
.alloc-row .actual{color:var(--green);font-weight:bold}

/* SCENARIO PLANNER */
.scenario-box{background:#0a0a15;border:1px solid var(--border);border-radius:6px;padding:16px;margin-bottom:12px}
.scenario-box h3{color:var(--gold);margin-bottom:12px;font-size:14px}
.scenario-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.scenario-row label{color:var(--dim);min-width:100px}
.scenario-row input,.scenario-row select{background:#14141f;border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:4px;font-family:inherit;font-size:12px}
.scenario-result{background:#1a2a1a;border:1px solid var(--green);border-radius:6px;padding:12px;margin-top:12px}
.scenario-result h4{color:var(--green);margin-bottom:8px}
.scenario-warning{background:#3a1a1a;border-color:var(--red)}
.scenario-warning h4{color:var(--red)}

/* INTEL */
.intel-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.intel-card{background:#0a0a15;border:1px solid var(--border);border-radius:6px;padding:12px}
.intel-card h3{color:var(--orange);margin-bottom:6px;font-size:13px}
.intel-card .tendency{color:var(--dim);margin-bottom:4px;font-size:12px}
.intel-card .exploit{color:var(--green);font-size:12px}
.nom-list{list-style:none;padding:0}
.nom-list li{padding:4px 0;border-bottom:1px solid #1a1a2a;font-size:12px}
.nom-list .phase{color:var(--gold);font-weight:bold;margin-top:8px}

.scroll-wrap{max-height:calc(100vh - 220px);overflow-y:auto}
.scroll-wrap::-webkit-scrollbar{width:6px}
.scroll-wrap::-webkit-scrollbar-track{background:var(--bg)}
.scroll-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.summary-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-bottom:12px}
.summary-card{background:#0a0a15;border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.summary-card .sc-val{font-size:20px;font-weight:bold;margin:4px 0}
.summary-card .sc-label{font-size:11px;color:var(--dim)}

.my-team{margin-bottom:12px}
.my-team h3{color:var(--gold);margin-bottom:6px}
.my-team-grid{display:flex;gap:6px;flex-wrap:wrap}
.my-team-chip{background:#1a2a1a;border:1px solid var(--green);border-radius:4px;padding:3px 8px;font-size:11px}
.my-team-chip .chip-price{color:var(--gold);margin-left:4px}

@media(max-width:900px){.alloc-grid,.intel-grid{grid-template-columns:1fr}}
</style>
</head>

function getAvail(){return AVAILABLE-state.mySpent}
function getPoolValue(){return PLAYERS.filter(p=>!p.drafted).reduce((s,p)=>s+(p.value||0),0)}
function getPoolCount(){return PLAYERS.filter(p=>!p.drafted).length}
function getPoolByType(t){return PLAYERS.filter(p=>!p.drafted&&p.type===t)}
function getInflation(){
  const totalPool=getPoolValue();
  const totalBudget=AVAILABLE*10; // 10 teams
  const draftedValue=PLAYERS.filter(p=>p.drafted).reduce((s,p)=>s+(p.value||0),0);
  const draftedSpend=PLAYERS.filter(p=>p.drafted).reduce((s,p)=>s+(p.draftPrice||0),0);
  const remainBudget=totalBudget-draftedSpend;
  const remainValue=totalPool;
  if(remainValue===0)return 1;
  return remainBudget/remainValue;
}
function getAdjustedValue(p){
  const inf=getInflation();
  return Math.round((p.value||0)*inf);
}

function draftPlayer(idx,price,team){
  PLAYERS[idx].drafted=true;

    state.mySpent+=price;
    state.myRoster.push({...PLAYERS[idx],draftPrice:price});
    if(PLAYERS[idx].type==='Pitcher')state.myPitching+=price;
    else state.myHitting+=price;
  }
  render();
}
function undraftPlayer(idx){
  const p=PLAYERS[idx];

    state.myRoster=state.myRoster.filter(r=>r.rank!==p.rank);

  }
  p.drafted=false;p.draftPrice=null;p.draftedBy='';
  render();
}

  if(p.includes('c')&&!p.includes('cf'))return'pos-c';if(p.includes('1b'))return'pos-1b';
  if(p.includes('2b'))return'pos-2b';if(p.includes('3b'))return'pos-3b';
  if(p.includes('ss'))return'pos-ss';if(p.includes('of'))return'pos-of';
  if(p.includes('dh'))return'pos-dh';return'pos-util';
}

function getSorted(){
  let list=[...PLAYERS];
  if(!state.showDrafted)list=list.filter(p=>!p.drafted);
  if(state.search){const s=state.search.toLowerCase();list=list.filter(p=>p.name.toLowerCase().includes(s)||p.team.toLowerCase().includes(s))}
  if(state.posFilter!=='ALL')list=list.filter(p=>p.pos.includes(state.posFilter));
  if(state.typeFilter!=='ALL')list=list.filter(p=>p.type===state.typeFilter);
  if(state.tierFilter!=='ALL')list=list.filter(p=>p.tier===parseInt(state.tierFilter));
  if(state.targetFilter==='TARGET')list=list.filter(p=>p.target.includes('TARGET'));
  if(state.targetFilter==='AVOID')list=list.filter(p=>p.target.includes('AVOID'));
  const col=state.sortCol;
  const dir=state.sortDir==='asc'?1:-1;
  list.sort((a,b)=>{
    let va=a[col],vb=b[col];
    if(typeof va==='string')return dir*va.localeCompare(vb);
    return dir*((va||0)-(vb||0));
  });
  return list;
}

function runScenario(){
  const out=document.getElementById('scenario-output');
  if(!out)return;
  const g=id=>({player:PLAYERS.find(p=>p.rank==document.getElementById(id)?.value),price:parseInt(document.getElementById(id.replace('player','price'))?.value)||0});
  const s1=g('sc-player1'),s2=g('sc-player2'),s3=g('sc-player3'),s4=g('sc-player4');
  
  if(!s1.player||!s1.price){out.innerHTML='';return}
  
  let html='<div style="margin-top:12px">';
  
  // Option A: buy player2 at price2
  if(s2.player&&s2.price){
    const fpts_a=s2.player.fpts2026;
    const cost_a=s2.price;
    const fptsPerDollar_a=(fpts_a/cost_a).toFixed(1);
    const budgetAfter_a=getAvail()-cost_a;
    const overpay_a=cost_a-(s2.player.value||0);
    const cls_a=overpay_a>10?'scenario-warning':'scenario-result';
    html+=`<div class="${cls_a}">
      <h4>OPTION A: ${s2.player.name} at $${cost_a}</h4>
      <div>FPTS: ${fpts_a} | FPTS/$: ${fptsPerDollar_a} | ${overpay_a>0?'Overpay: $'+overpay_a:'Value: $'+Math.abs(overpay_a)} vs model</div>
      <div>Budget after: $${budgetAfter_a} | AB Score: ${s2.player.abScore} | Health: ${s2.player.health}</div>
      ${overpay_a>15?'<div style="color:var(--red)">⚠️ Significant overpay risk. Make sure youre not chasing.</div>':''}
      ${budgetAfter_a<35?'<div style="color:var(--red)">⚠️ FAAB reserve falls below $35 target.</div>':''}
    </div>`;
  }
  
  // Option B: pivot to player3 + player4
  if(s3.player&&s3.price){
    const fpts_b=s3.player.fpts2026+(s4.player?s4.player.fpts2026:0);
    const cost_b=s3.price+(s4.price||0);
    const fptsPerDollar_b=(fpts_b/cost_b).toFixed(1);
    const budgetAfter_b=getAvail()-cost_b;
    const cls_b=budgetAfter_b<35?'scenario-warning':'scenario-result';
    html+=`<div class="${cls_b}" style="margin-top:8px">
      <h4>OPTION B: ${s3.player.name} $${s3.price}${s4.player?' + '+s4.player.name+' $'+s4.price:''}</h4>
      <div>Combined FPTS: ${fpts_b} | FPTS/$: ${fptsPerDollar_b} | Cost: $${cost_b}</div>
      <div>Budget after: $${budgetAfter_b} | You get TWO roster spots filled</div>
      ${fpts_b>(s2.player?s2.player.fpts2026:0)?'<div style="color:var(--green)">✅ Higher combined FPTS output.</div>':'<div style="color:var(--orange)">⚠️ Lower combined FPTS — but more roster flexibility.</div>'}
      ${budgetAfter_b>budgetAfter_a?'<div style="color:var(--green)">✅ More budget remaining for other positions.</div>':''}
    </div>`;
    
    // Comparison
    if(s2.player&&s2.price){
      const diff=fpts_b-s2.player.fpts2026;
      const costDiff=cost_b-s2.price;
      html+=`<div class="scenario-result" style="margin-top:8px;background:#1a1a2a;border-color:var(--gold)">
        <h4 style="color:var(--gold)">📊 VERDICT</h4>
        <div>FPTS difference: ${diff>0?'+':''}${diff} | Cost difference: ${costDiff>0?'+$':'$'}${costDiff}</div>
        <div style="margin-top:4px;color:${diff>0&&costDiff<=0?'var(--green)':diff>0&&costDiff>0?'var(--cyan)':'var(--orange)'}">
          ${diff>0&&costDiff<=0?'🎯 OPTION B WINS: More FPTS for less money. Easy call.':''}
          ${diff>0&&costDiff>0?'📈 OPTION B has higher FPTS but costs more. Worth it if budget allows.':''}
          ${diff<=0&&costDiff<0?'💰 OPTION B saves money but sacrifices FPTS. Good if you need FAAB.':''}
          ${diff<=0&&costDiff>=0?'⚠️ OPTION A looks better on both cost and production.':''}
        </div>
      </div>`;
    }
  }
  
  html+='</div>';
  out.innerHTML=html;
  var budgetAfter_a=0; // reset for scope
}

      <li>2. <strong>Ronald Acuña Jr.</strong> — Uhlenkamp chases injured OF. Let them overpay.</li>
      <li>3. <strong>Tarik Skubal</strong> — Cardinal and Gold spent $42. Let them fight MeShe/Sarre.</li>
      <li>4. <strong>Luis Robert Jr.</strong> — Name value exceeds projection. Someone will overpay.</li>
      <li>5. <strong>Yordan Alvarez</strong> — Uhlenkamp paid $44 for 110 FPTS. May chase redemption.</li>
      <li class="phase">MID — Drain pitching budgets:</li>
      <li>Nominate Glasnow, McClanahan, Snell (injury risks someone overpays for).</li>
      <li>Nominate catchers: Raleigh, Contreras. Someone always overpays for scarce C.</li>
      <li class="phase">LATE — Your targets (prices should be lower):</li>
      <li>Hitters: Springer, Burleson, Suzuki, Aranda</li>
      <li>SP: Rogers, Sheehan, Gore, Horton</li>
      <li>IL Stashes: Wheeler, Cole, Rodón</li>
    </ul>
  </div>
  <div class="intel-grid">
  ${OPPONENTS.map(o=>`
    <div class="intel-card">
      <h3>${o.name} — ${o.style}</h3>
      <div class="tendency">📋 ${o.tendency}</div>
      <div class="exploit">💡 ${o.exploit}</div>
    </div>
  `).join('')}
  </div>
  <div class="alloc-section" style="margin-top:12px">
    <h3>🔮 KEEPER VALUE TARGETS (for 2027)</h3>
    <div style="padding:8px;line-height:1.8">
      <div><strong>Jonathan Aranda</strong> (1B, TB) — 345 FPTS proj. If $3-5, elite keeper candidate.</div>
      <div><strong>Cade Horton</strong> (SP, CHC) — 348 FPTS proj. Breakout last year. $5-8 = keeper gold.</div>
      <div><strong>Caleb Durbin</strong> (3B, BOS) — 326 FPTS proj. $1 last year, 323 FPTS. Fenway boost.</div>
      <div><strong>Brandon Lowe</strong> (2B, PIT) — 327 FPTS proj. 31 HR last year. $5-8, stash.</div>
      <div><strong>Daniel Palencia</strong> (RP, CHC) — if he closes, $1 = RP keeper.</div>
    </div>
  </div>`;
}

function toggleSort(col){
  if(state.sortCol===col)state.sortDir=state.sortDir==='asc'?'desc':'asc';
  else{state.sortCol=col;state.sortDir=col==='rank'?'asc':'desc'}
  render();
}

function render(){
  const tabs=['tracker','budget','scenario','intel'];
  const labels=['📋 Draft Tracker','💰 Budget Model','🔄 Scenarios','🕵️ Intel & Nominations'];
  let html=`
  <header>
    <h1>⚾ DEDEAUX FIELD 4.0 — DRAFT COMMAND CENTER</h1>
    <div class="budget-bar">
      <div class="stat"><span class="label">Budget:</span><span class="val val-gold">$${getAvail()}</span></div>
      <div class="stat"><span class="label">Spent:</span><span class="val val-red">$${state.mySpent}</span></div>
      <div class="stat"><span class="label">Roster:</span><span class="val val-blue">${state.myRoster.length+3}/${23}</span></div>
      <div class="stat"><span class="label">Pool:</span><span class="val val-green">${getPoolCount()}</span></div>
      <div class="stat"><span class="label">Inflation:</span><span class="val ${getInflation()>1.05?'val-red':'val-green'}">${getInflation().toFixed(2)}x</span></div>
    </div>
  </header>
  <div class="tabs">
    ${tabs.map((t,i)=>`<div class="tab ${state.tab===t?'active':''}" onclick="state.tab='${t}';render()">${labels[i]}</div>`).join('')}
  </div>
  <div class="panel">`;
  
  if(state.tab==='tracker')html+=renderTracker();
  else if(state.tab==='budget')html+=renderBudget();
  else if(state.tab==='scenario')html+=renderScenario();
  else if(state.tab==='intel')html+=renderIntel();
  
  html+='</div>';
  document.getElementById('root').innerHTML=html;
}

render();
</script>
</body>
</html>
